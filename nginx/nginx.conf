worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    # ── security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          SAMEORIGIN;
    add_header X-Content-Type-Options   nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";

    # ── gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── upstream (gunicorn) ───────────────────────────────────────────────────
    upstream app {
        server app:5000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;      # ← replace with your domain once DNS is set

        # Let's Encrypt / certbot challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    # Uncomment this block after you have SSL certificates.
    # Run certbot (see DEPLOY.md) then reload nginx:
    #   docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #
    #     # Proxy to gunicorn
    #     location / {
    #         proxy_pass         http://app;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto https;
    #         proxy_set_header   Connection        "";
    #         proxy_read_timeout 120s;
    #     }
    # }

    # ── HTTP-only fallback (use while waiting for SSL cert) ───────────────────
    # Delete this block once the HTTPS block above is uncommented.
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
        }
    }
}
