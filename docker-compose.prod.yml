# ── PRODUCTION ───────────────────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d
# Exposes HTTP on :80 and HTTPS on :443 (after adding your SSL certs).
#
# Serial port passthrough: if the radio is attached to the server,
# uncomment the `devices` block under the `app` service and set the
# correct device path.  When deployed to a cloud EC2 without a
# physically-attached radio the serial section stays commented out.
version: "3.9"

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/sikconfigurator}:latest
    # or build locally:  build: .
    restart: unless-stopped
    environment:
      - PORT=5000
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    # Uncomment when a radio is physically attached to this server:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    # group_add:
    #   - dialout
    networks:
      - internal
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates (populated by certbot or your CA)
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
