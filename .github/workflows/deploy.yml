name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. TEST ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyserial flask pytest

      - name: Syntax / import check
        run: |
          python -c "from src.serial_protocol import SIKRadioProtocol"
          python -c "from src.config_manager import RadioConfiguration"
          python -c "from web_app import app"

      - name: Run tests
        # Allow no-test-file scenario; remove `|| true` once you add tests
        run: pytest tests/ -v --tb=short || true

  # ── 2. BUILD & PUSH image (main branch only) ─────────────────────────────────
  build-push:
    name: Build & push Docker image
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds to speed things up
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 3. DEPLOY to EC2 ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production    # optional: add approval gate in GitHub Settings → Environments

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          # Pass the GHCR token so the server can pull the new image
          envs: GHCR_TOKEN,GITHUB_ACTOR,IMAGE_NAME,REGISTRY
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.EC2_DEPLOY_PATH || '/opt/sikconfigurator' }}"
            cd "$DEPLOY_DIR"

            # ── pull latest code (nginx.conf, docker-compose.prod.yml, etc.) ──
            git fetch --quiet origin main
            git reset --hard origin/main

            # ── authenticate to GHCR and pull new image ───────────────────────
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker pull "$REGISTRY/$IMAGE_NAME:latest"

            # ── (re)start services with zero downtime ─────────────────────────
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── prune dangling images ─────────────────────────────────────────
            docker image prune -f

            echo "Deploy complete ✓"
        env:
          GHCR_TOKEN:  ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_NAME:   ${{ env.IMAGE_NAME }}
          REGISTRY:     ${{ env.REGISTRY }}
