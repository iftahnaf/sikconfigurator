# ── LOCAL DEVELOPMENT ────────────────────────────────────────────────────────
# Usage: docker compose up --build
# The app runs on http://localhost:5000
# Serial port is passed through from the host — adjust /dev/ttyUSB0 as needed.
version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - LOG_LEVEL=debug
    # Pass through serial devices. Uncomment and adjust to your port.
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyACM0:/dev/ttyACM0
    # group_add:
    #   - dialout
    volumes:
      # Hot-reload source without rebuilding
      - ./src:/app/src
      - ./web_app.py:/app/web_app.py
      - ./templates:/app/templates
    restart: unless-stopped
